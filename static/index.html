<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM 知识库问答</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --user-bubble: #2563eb;
      --bot-bubble: #f8fafc;
      --bot-border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                   'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-sub { font-size: 12px; color: var(--muted); }

    #status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #94a3b8; display: inline-block;
      transition: background .3s;
    }
    .dot.online { background: #22c55e; }
    .dot.error  { background: #ef4444; }

    .upload-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .upload-link:hover {
      background: #eff6ff;
    }

    /* ===== Main layout ===== */
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
      gap: 16px;
    }

    /* ===== Chat area ===== */
    .chat-container {
      flex: 1;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9px; }

    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--user-bubble); color: #fff; }
    .msg.bot  .avatar { background: #f0f4ff; color: var(--primary); border: 1px solid var(--border); }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-radius: var(--radius) 2px var(--radius) var(--radius);
    }
    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--bot-border);
      border-radius: 2px var(--radius) var(--radius) var(--radius);
      color: var(--text);
    }

    .sources {
      margin-top: 8px;
      padding: 8px 12px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .sources strong { color: var(--text); }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 4px 0;
    }
    .typing-indicator span {
      width: 7px; height: 7px; background: var(--muted);
      border-radius: 50%; animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-7px); }
    }

    /* ===== Input area ===== */
    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--card);
    }
    #question {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14.5px;
      resize: none;
      max-height: 140px;
      min-height: 42px;
      outline: none;
      font-family: inherit;
      color: var(--text);
      line-height: 1.5;
      transition: border-color .2s;
      overflow-y: auto;
    }
    #question:focus { border-color: var(--primary); }

    #send-btn {
      height: 42px; min-width: 72px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: var(--primary-hover); }
    #send-btn:disabled { opacity: .55; cursor: not-allowed; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; }
    .stat-row span:last-child { font-weight: 600; color: var(--primary); }
    .stat-divider { height: 1px; background: var(--border); margin: 6px 0; }

    .questions-list { display: flex; flex-direction: column; gap: 6px; }
    .q-btn {
      text-align: left;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      line-height: 1.4;
      transition: background .15s, border-color .15s;
    }
    .q-btn:hover { background: #f0f4ff; border-color: var(--primary); color: var(--primary); }

    #rebuild-btn {
      width: 100%; padding: 10px;
      background: #fff; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; cursor: pointer;
      color: var(--muted); transition: all .15s;
    }
    #rebuild-btn:hover:not(:disabled) { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
    #rebuild-btn:disabled { opacity: .5; cursor: not-allowed; }

    #rebuild-msg { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; }

    /* ===== Welcome message ===== */
    .welcome {
      text-align: center; margin: auto;
      padding: 40px 20px;
      color: var(--muted);
    }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.6; }

    /* ===== Responsive ===== */
    @media (max-width: 720px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; }
    }

    /* ===== Feedback buttons ===== */
    .feedback-bar {
      display: flex; gap: 8px; align-items: center;
      margin-top: 8px; flex-wrap: wrap;
    }
    .fb-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 11px; font-size: 13px;
      cursor: pointer; color: var(--muted); transition: all .15s;
      line-height: 1.6;
    }
    .fb-btn:hover { border-color: var(--primary); color: var(--primary); }
    .fb-btn.active-up   { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
    .fb-btn.active-down { background: #fee2e2; border-color: #ef4444; color: #dc2626; }
    .fb-label { font-size: 12px; color: var(--muted); }

    /* ===== 手动评分面板 ===== */
    .manual-score-panel {
      margin-top: 10px; padding: 10px 12px;
      background: #f8fafc; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px;
    }
    .manual-score-panel .ms-title {
      font-weight: 600; margin-bottom: 8px; color: #334155;
    }
    .ms-row {
      display: flex; align-items: center; margin-bottom: 6px; gap: 8px;
    }
    .ms-label { width: 46px; color: var(--muted); flex-shrink: 0; }
    .stars { display: flex; gap: 3px; }
    .star {
      font-size: 18px; cursor: pointer; color: #cbd5e1; line-height: 1;
      transition: color .1s; user-select: none;
    }
    .star.lit { color: #f59e0b; }
    .star:hover, .star.hover { color: #f59e0b; }
    .ms-val { font-size: 12px; color: var(--muted); width: 20px; }
    .ms-comment {
      width: 100%; margin-top: 6px; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: 5px;
      font-size: 12px; resize: none; font-family: inherit;
      color: #334155;
    }
    .ms-submit {
      margin-top: 8px; padding: 5px 14px; font-size: 13px;
      background: var(--primary); color: #fff; border: none;
      border-radius: 6px; cursor: pointer; transition: opacity .15s;
    }
    .ms-submit:hover { opacity: .85; }
    .ms-submit:disabled { opacity: .5; cursor: default; }
    .ms-done { font-size: 12px; color: #16a34a; margin-top: 6px; }

    /* ===== Quality panel ===== */
    .score-row {
      display: flex; align-items: center;
      justify-content: space-between; padding: 5px 0; font-size: 13px;
    }
    .score-bar {
      flex: 1; height: 6px; background: var(--border);
      border-radius: 3px; margin: 0 10px;
    }
    .score-fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width .4s; }
    .score-val  { font-weight: 600; color: var(--primary); min-width: 30px; text-align: right; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🗂️</div>
    <div>
      <div class="header-title">CRM 知识库问答</div>
      <div class="header-sub">基于 OpenAI + Milvus RAG</div>
    </div>
  </div>
  <div style="display: flex; align-items: center; gap: 16px;">
    <a href="/upload" class="upload-link">📁 文件上传</a>
    <a href="/admin" class="upload-link">⚙️ 后台管理</a>
    <div id="status-badge">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">检查中...</span>
    </div>
  </div>
</header>

<div class="layout">
  <!-- 聊天区 -->
  <div class="chat-container">
    <div id="messages">
      <div class="welcome" id="welcome-msg">
        <div class="icon">💬</div>
        <h2>你好，我是 CRM 助手</h2>
        <p>我可以帮你查询客户跟进记录、沟通结论、待办事项等信息。<br>请在下方输入你的问题。</p>
      </div>
    </div>
    <div class="input-area">
      <textarea id="question" placeholder="输入你的问题，按 Enter 发送，Shift+Enter 换行…" rows="1"></textarea>
      <button id="send-btn">发送</button>
    </div>
  </div>

  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="card">
      <h3>知识库状态</h3>
      <div class="stat-row"><span>向量数据库</span><span id="stat-milvus">—</span></div>
      <div class="stat-divider"></div>
      <div class="stat-row"><span>文档片段数</span><span id="stat-count">—</span></div>
      <div class="stat-divider"></div>
      <div class="stat-row"><span>集合名称</span><span id="stat-collection">—</span></div>
    </div>

    <div class="card">
      <h3>示例问题</h3>
      <div class="questions-list" id="sample-questions">
        <button class="q-btn" onclick="fillQuestion(this)">最近有哪些客户进展？</button>
        <button class="q-btn" onclick="fillQuestion(this)">上海朋熙半导体的进展如何？</button>
        <button class="q-btn" onclick="fillQuestion(this)">目前有哪些待跟进的客户？</button>
        <button class="q-btn" onclick="fillQuestion(this)">蒯歆越负责的客户有哪些？</button>
        <button class="q-btn" onclick="fillQuestion(this)">哪些客户正在等待回款？</button>
      </div>
    </div>

    <div class="card">
      <h3>知识库管理</h3>
      <button id="rebuild-btn" onclick="rebuildIndex()">🔄 重建索引</button>
      <div id="rebuild-msg"></div>
      <button id="mcp-btn" onclick="window.location.href='/static/mcp.html'" style="margin-top: 10px; width: 100%; padding: 10px; background: #fff; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--muted); transition: all .15s;">
        🔌 MCP 数据源
      </button>
    </div>

    <div class="card" id="quality-card">
      <h3>回答质量</h3>
      <div class="stat-row"><span>总问答数</span><span id="q-total">—</span></div>
      <div class="stat-divider"></div>
      <div class="stat-row"><span>好评率</span><span id="q-uprate">—</span></div>
      <div class="stat-divider"></div>
      <div class="stat-row"><span>平均响应</span><span id="q-ms">—</span></div>
      <div class="stat-divider"></div>
      <div style="font-size:12px;color:var(--muted);margin:4px 0 2px">AI 自动评分均值</div>
      <div class="score-row">
        <span>相关性</span>
        <div class="score-bar"><div class="score-fill" id="q-rel-bar" style="width:0%"></div></div>
        <span class="score-val" id="q-rel">—</span>
      </div>
      <div class="score-row">
        <span>完整性</span>
        <div class="score-bar"><div class="score-fill" id="q-comp-bar" style="width:0%"></div></div>
        <span class="score-val" id="q-comp">—</span>
      </div>
      <div class="score-row">
        <span>准确性(AI)</span>
        <div class="score-bar"><div class="score-fill" id="q-acc-bar" style="width:0%"></div></div>
        <span class="score-val" id="q-acc">—</span>
      </div>
      <div class="stat-divider"></div>
      <div style="font-size:12px;color:var(--muted);margin:4px 0 2px">手动评分均值</div>
      <div class="score-row">
        <span>相关性</span>
        <div class="score-bar"><div class="score-fill" id="m-rel-bar" style="width:0%;background:#f59e0b"></div></div>
        <span class="score-val" id="m-rel" style="color:#f59e0b">—</span>
      </div>
      <div class="score-row">
        <span>完整性</span>
        <div class="score-bar"><div class="score-fill" id="m-comp-bar" style="width:0%;background:#f59e0b"></div></div>
        <span class="score-val" id="m-comp" style="color:#f59e0b">—</span>
      </div>
      <div class="score-row">
        <span>准确性</span>
        <div class="score-bar"><div class="score-fill" id="m-acc-bar" style="width:0%;background:#f59e0b"></div></div>
        <span class="score-val" id="m-acc" style="color:#f59e0b">—</span>
      </div>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const questionEl = document.getElementById('question');
  const sendBtn    = document.getElementById('send-btn');
  let isStreaming  = false;
  let currentAnswerId = null; // 当前回答对应的 answer_id

  // ===== 健康检查 =====
  async function checkHealth() {
    try {
      const res = await fetch('/api/health');
      const data = await res.json();
      const dot  = document.getElementById('status-dot');
      const txt  = document.getElementById('status-text');
      if (data.status === 'ok') {
        dot.className = 'dot online';
        txt.textContent = '服务正常';
        document.getElementById('stat-milvus').textContent = '已连接';
        document.getElementById('stat-count').textContent = (data.doc_count || 0).toLocaleString();
        document.getElementById('stat-collection').textContent = data.collection || '—';
      } else {
        dot.className = 'dot error';
        txt.textContent = '服务异常';
        document.getElementById('stat-milvus').textContent = '未连接';
      }
    } catch {
      document.getElementById('status-dot').className = 'dot error';
      document.getElementById('status-text').textContent = '无法连接';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  // ===== 质量看板 =====
  async function loadQualityStats() {
    try {
      const res  = await fetch('/api/feedback/stats');
      const body = await res.json();
      if (!body.success) return;
      const d = body.data;
      document.getElementById('q-total').textContent = d.total || 0;
      document.getElementById('q-uprate').textContent =
        d.thumbs_up_rate !== null ? (d.thumbs_up_rate * 100).toFixed(0) + '%' : '—';
      document.getElementById('q-ms').textContent =
        d.avg_response_ms !== null ? (d.avg_response_ms / 1000).toFixed(1) + 's' : '—';
      const setScore = (barId, valId, val, color) => {
        document.getElementById(valId).textContent = val !== null ? val.toFixed(1) : '—';
        document.getElementById(barId).style.width = val !== null ? ((val - 1) / 4 * 100).toFixed(0) + '%' : '0%';
      };
      setScore('q-rel-bar',  'q-rel',  d.avg_llm_relevance);
      setScore('q-comp-bar', 'q-comp', d.avg_llm_completeness);
      setScore('q-acc-bar',  'q-acc',  d.avg_llm_accuracy);
      setScore('m-rel-bar',  'm-rel',  d.avg_manual_relevance);
      setScore('m-comp-bar', 'm-comp', d.avg_manual_completeness);
      setScore('m-acc-bar',  'm-acc',  d.avg_manual_accuracy);
    } catch (e) {
      console.warn('quality stats failed:', e);
    }
  }
  loadQualityStats();
  setInterval(loadQualityStats, 60000);

  // ===== 提交反馈 =====
  async function submitFeedback(answerId, thumbs, btn) {
    try {
      const res = await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answer_id: answerId, thumbs, trigger_judge: true }),
      });
      if (!res.ok) return;
      // 更新按钮样式
      const bar = btn.closest('.feedback-bar');
      bar.querySelectorAll('.fb-btn').forEach(b => b.classList.remove('active-up', 'active-down'));
      btn.classList.add(thumbs === 1 ? 'active-up' : 'active-down');
      const label = bar.querySelector('.fb-label');
      if (label) label.textContent = thumbs === 1 ? '感谢反馈 🙏' : '感谢反馈';
      setTimeout(loadQualityStats, 3000); // 稍后刷新看板
    } catch (e) {
      console.warn('feedback failed:', e);
    }
  }

  // ===== 自动调整输入框高度 =====
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto';
    questionEl.style.height = Math.min(questionEl.scrollHeight, 140) + 'px';
  });

  // ===== 快捷键 =====
  questionEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });
  sendBtn.addEventListener('click', () => {
    if (!isStreaming) sendMessage();
  });

  // ===== 示例问题 =====
  function fillQuestion(btn) {
    questionEl.value = btn.textContent;
    questionEl.focus();
    questionEl.dispatchEvent(new Event('input'));
  }

  // ===== 添加消息气泡 =====
  function addMessage(role, text, sources) {
    const welcome = document.getElementById('welcome-msg');
    if (welcome) welcome.remove();

    const msgDiv = document.createElement('div');
    msgDiv.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);

    if (sources && sources.length > 0) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      srcDiv.innerHTML = `<strong>📄 参考来源：</strong>${sources.join('、')}`;
      const wrapper = document.createElement('div');
      wrapper.appendChild(bubble);
      wrapper.appendChild(srcDiv);
      msgDiv.appendChild(wrapper);
      // 移除上面那个 bubble 添加，重新组织
      msgDiv.innerHTML = '';
      msgDiv.appendChild(avatar);
      msgDiv.appendChild(wrapper);
    }

    messagesEl.appendChild(msgDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  // ===== 流式发送消息 =====
  async function sendMessage() {
    const q = questionEl.value.trim();
    if (!q) return;

    addMessage('user', q);
    questionEl.value = '';
    questionEl.style.height = 'auto';

    // 显示打字动画
    const typingDiv = document.createElement('div');
    typingDiv.className = 'msg bot';
    typingDiv.id = 'typing';
    typingDiv.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    messagesEl.appendChild(typingDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    isStreaming = true;
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    let answerText = '';
    let sources = [];
    let botBubble = null;
    let botWrapper = null;

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // 保留不完整的行

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const payload = JSON.parse(line.slice(6));

            if (payload.type === 'sources') {
              sources = payload.sources || [];
              // 移除打字动画，创建回答气泡（先显示"正在思考..."）
              document.getElementById('typing')?.remove();

              const msgDiv = document.createElement('div');
              msgDiv.className = 'msg bot';
              const avatar = document.createElement('div');
              avatar.className = 'avatar';
              avatar.textContent = '🤖';
              botBubble = document.createElement('div');
              botBubble.className = 'bubble';
              botBubble.style.color = '#94a3b8';
              botBubble.textContent = '正在思考...';
              botWrapper = document.createElement('div');
              botWrapper.appendChild(botBubble);
              msgDiv.appendChild(avatar);
              msgDiv.appendChild(botWrapper);
              messagesEl.appendChild(msgDiv);
              messagesEl.scrollTop = messagesEl.scrollHeight;

            } else if (payload.type === 'token') {
              if (!answerText) {
                // 收到第一个 token，清除占位文字
                botBubble.style.color = '';
                botBubble.textContent = '';
              }
              answerText += payload.content;
              if (botBubble) {
                botBubble.textContent = answerText;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              }

            } else if (payload.type === 'error') {
              document.getElementById('typing')?.remove();
              const errText = payload.content || '未知错误';
              if (botBubble) {
                botBubble.style.color = '#ef4444';
                botBubble.textContent = `❌ ${errText}`;
              } else {
                addMessage('bot', `❌ ${errText}`);
              }

            } else if (payload.type === 'answer_id') {
              // 收到 answer_id，带出赞/踩 + 手动打分面板
              currentAnswerId = payload.id;
              if (botWrapper && currentAnswerId) {
                // --- 赞/踩快捷按钮 ---
                const feedbackBar = document.createElement('div');
                feedbackBar.className = 'feedback-bar';
                feedbackBar.innerHTML = `
                  <span class="fb-label">这个回答对您有帮助吗？</span>
                  <button class="fb-btn" onclick="submitFeedback('${currentAnswerId}', 1, this)">👍 有帮助</button>
                  <button class="fb-btn" onclick="submitFeedback('${currentAnswerId}', -1, this)">👎 无帮助</button>
                `;
                botWrapper.appendChild(feedbackBar);

                // --- 手动打分面板 ---
                const panel = document.createElement('div');
                panel.className = 'manual-score-panel';
                panel.id = 'manual-panel-' + currentAnswerId;
                panel.innerHTML = `
                  <div class="ms-title">📝 手动打分（1~5 颗星）</div>
                  ${buildStarRow('rel',  '相关性', currentAnswerId)}
                  ${buildStarRow('comp', '完整性', currentAnswerId)}
                  ${buildStarRow('acc',  '准确性', currentAnswerId)}
                  <textarea class="ms-comment" id="ms-comment-${currentAnswerId}" rows="2" placeholder="评语（可选）"></textarea>
                  <br>
                  <button class="ms-submit" onclick="submitManualScore('${currentAnswerId}')">提交打分</button>
                  <span class="ms-done" id="ms-done-${currentAnswerId}" style="display:none">✅ 已提交</span>
                `;
                botWrapper.appendChild(panel);
                // 绑定星星悬停和点击
                bindStars(currentAnswerId);
              }

            } else if (payload.type === 'done') {
              // 如果没有收到任何 token，显示提示
              if (!answerText && botBubble) {
                botBubble.style.color = '#ef4444';
                botBubble.textContent = '❌ 模型未返回内容，请检查服务日志';
              }
              // 追加来源
              if (sources.length > 0 && botWrapper) {
                const srcDiv = document.createElement('div');
                srcDiv.className = 'sources';
                srcDiv.innerHTML = `<strong>📄 参考来源：</strong>${sources.join('、')}`;
                botWrapper.appendChild(srcDiv);
              }
            }
          } catch (parseErr) {
            // 忽略解析错误
          }
        }
      }

    } catch (err) {
      document.getElementById('typing')?.remove();
      addMessage('bot', `❌ 请求失败：${err.message}`);
    } finally {
      document.getElementById('typing')?.remove();
      isStreaming = false;
      sendBtn.disabled = false;
      sendBtn.textContent = '发送';
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  // ===== 手动打分星星工具函数 =====
  function buildStarRow(dim, label, aid) {
    const stars = [1,2,3,4,5].map(n =>
      `<span class="star" data-aid="${aid}" data-dim="${dim}" data-val="${n}">★</span>`
    ).join('');
    return `<div class="ms-row">
      <span class="ms-label">${label}</span>
      <div class="stars" id="stars-${dim}-${aid}">${stars}</div>
      <span class="ms-val" id="ms-val-${dim}-${aid}">-</span>
    </div>`;
  }

  function bindStars(aid) {
    ['rel','comp','acc'].forEach(dim => {
      const container = document.getElementById(`stars-${dim}-${aid}`);
      if (!container) return;
      const stars = container.querySelectorAll('.star');
      stars.forEach(star => {
        star.addEventListener('mouseenter', () => {
          const v = +star.dataset.val;
          stars.forEach(s => s.classList.toggle('hover', +s.dataset.val <= v));
        });
        star.addEventListener('mouseleave', () => {
          const selected = container.querySelector('.star.lit');
          const sel = selected ? +selected.dataset.val : 0;
          stars.forEach(s => {
            s.classList.remove('hover');
            s.classList.toggle('lit', +s.dataset.val <= sel);
          });
        });
        star.addEventListener('click', () => {
          const v = +star.dataset.val;
          stars.forEach(s => s.classList.toggle('lit', +s.dataset.val <= v));
          document.getElementById(`ms-val-${dim}-${aid}`).textContent = v;
        });
      });
    });
  }

  async function submitManualScore(aid) {
    const getDimVal = dim => {
      const lit = document.querySelectorAll(`#stars-${dim}-${aid} .star.lit`);
      return lit.length;
    };
    const rel  = getDimVal('rel');
    const comp = getDimVal('comp');
    const acc  = getDimVal('acc');
    if (!rel || !comp || !acc) {
      alert('请为三个维度都打分后再提交');
      return;
    }
    const comment = document.getElementById(`ms-comment-${aid}`)?.value || '';
    const btn = document.querySelector(`#manual-panel-${aid} .ms-submit`);
    if (btn) btn.disabled = true;
    try {
      const res = await fetch('/api/feedback', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          answer_id: aid,
          manual_relevance: rel,
          manual_completeness: comp,
          manual_accuracy: acc,
          manual_comment: comment,
          trigger_judge: false,
        }),
      });
      if (res.ok) {
        const doneEl = document.getElementById(`ms-done-${aid}`);
        if (doneEl) doneEl.style.display = 'inline';
        if (btn) btn.style.display = 'none';
        setTimeout(loadQualityStats, 1500);
      } else {
        alert('提交失败，请重试');
        if (btn) btn.disabled = false;
      }
    } catch(e) {
      alert('网络错误：' + e.message);
      if (btn) btn.disabled = false;
    }
  }

  // ===== 重建索引 =====
  async function rebuildIndex() {
    const btn = document.getElementById('rebuild-btn');
    const msg = document.getElementById('rebuild-msg');
    if (!confirm('确认重建知识库索引？这将重新读取所有文档并写入 Milvus，可能需要几分钟。')) return;
    btn.disabled = true;
    msg.textContent = '⏳ 重建中，请稍候...';
    try {
      const res = await fetch('/api/index', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ confirm: true }),
      });
      const data = await res.json();
      if (data.success) {
        msg.textContent = `✅ 完成！共 ${data.chunk_count} 个片段`;
        checkHealth();
      } else {
        msg.textContent = `❌ 失败：${data.detail}`;
      }
    } catch (e) {
      msg.textContent = `❌ 网络错误：${e.message}`;
    } finally {
      btn.disabled = false;
    }
  }
</script>
